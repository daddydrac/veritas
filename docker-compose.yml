name: ${COMPOSE_PROJECT_NAME:-veritas}

x-veritas-env: &veritas-env
  VERITAS_CONFIG: ${VERITAS_CONFIG:-/workspace/config/veritas.yaml}
  VERITAS_OPENSEARCH_URL: http://opensearch:9200
  VERITAS_OPENSEARCH_INDEX: ${VERITAS_OPENSEARCH_INDEX:-veritas-papers}
  VERITAS_FUSEKI_BASE_URL: http://fuseki:3030
  VERITAS_FUSEKI_QUERY_URL: http://fuseki:3030/${VERITAS_FUSEKI_DATASET:-veritas}/sparql
  VERITAS_FUSEKI_UPDATE_URL: http://fuseki:3030/${VERITAS_FUSEKI_DATASET:-veritas}/update
  VERITAS_FUSEKI_GRAPH_URL: http://fuseki:3030/${VERITAS_FUSEKI_DATASET:-veritas}/data
  VERITAS_FUSEKI_PING_URL: http://fuseki:3030/$$/ping
  VERITAS_MODEL_PROVIDER: ${VERITAS_MODEL_PROVIDER:-vllm}
  VERITAS_MODEL_SERVING_PROVIDER: ${VERITAS_MODEL_SERVING_PROVIDER:-vllm}
  VERITAS_PLANNER_MODEL: ${VERITAS_PLANNER_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}
  VERITAS_CODE_MODEL: ${VERITAS_CODE_MODEL:-Qwen/Qwen2.5-Coder-14B-Instruct}
  VERITAS_CODE_FALLBACK_MODEL: ${VERITAS_CODE_FALLBACK_MODEL:-deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct}
  VERITAS_MATH_MODEL: ${VERITAS_MATH_MODEL:-allenai/Olmo-3-7B-Instruct}
  VERITAS_MATH_LARGE_MODEL: ${VERITAS_MATH_LARGE_MODEL:-allenai/Olmo-3.1-32B-Instruct}
  VERITAS_EMBEDDING_MODEL: ${VERITAS_EMBEDDING_MODEL:-Muennighoff/SBERT-base-nli-v2}
  VERITAS_EMBEDDING_URL: http://embedding:8090
  VERITAS_OPENSEARCH_VECTOR_FIELD: ${VERITAS_OPENSEARCH_VECTOR_FIELD:-embedding}
  VERITAS_PLANNER_VLLM_URL: ${VERITAS_PLANNER_VLLM_URL:-http://vllm-planner:8000}
  VERITAS_CODE_VLLM_URL: ${VERITAS_CODE_VLLM_URL:-http://vllm-code:8000}
  VERITAS_MATH_VLLM_URL: ${VERITAS_MATH_VLLM_URL:-http://vllm-math:8000}
  VERITAS_REQUIRE_MODELS: ${VERITAS_REQUIRE_MODELS:-false}

x-vllm-env: &vllm-env
  HF_HOME: /models/huggingface
  TRANSFORMERS_CACHE: /models/huggingface
  HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
  HF_TOKEN: ${HF_TOKEN:-}
  VLLM_ENABLE_CUDA_COMPATIBILITY: ${VERITAS_VLLM_ENABLE_CUDA_COMPATIBILITY:-1}

x-vllm-common: &vllm-common
  image: ${VERITAS_VLLM_IMAGE:-vllm/vllm-openai:latest}
  ipc: host
  environment:
    <<: *vllm-env
  volumes:
    - hf-cache:/models/huggingface
  gpus:
    - device_ids: ["${VERITAS_GPU_DEVICE_ID:-0}"]
      capabilities: ["gpu"]
  restart: unless-stopped

services:
  opensearch:
    image: opensearchproject/opensearch:${VERITAS_OPENSEARCH_VERSION:-2.19.5}
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-VeritasAdmin123!}
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "${VERITAS_OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  dashboards:
    image: opensearchproject/opensearch-dashboards:${VERITAS_OPENSEARCH_VERSION:-2.19.5}
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${VERITAS_OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 30

  fuseki:
    image: ${VERITAS_FUSEKI_IMAGE:-stain/jena-fuseki:5.5.0}
    environment:
      ADMIN_PASSWORD: ${VERITAS_FUSEKI_ADMIN_PASSWORD:-admin}
      FUSEKI_DATASET_1: ${VERITAS_FUSEKI_DATASET:-veritas}
    ports:
      - "${VERITAS_FUSEKI_PORT:-3030}:3030"
    volumes:
      - fuseki-data:/fuseki
      - ./packages/ontology:/workspace/ontology:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3030/$$/ping >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30


  embedding:
    build:
      context: .
      dockerfile: services/embedding/Dockerfile
    environment:
      VERITAS_EMBEDDING_MODEL: ${VERITAS_EMBEDDING_MODEL:-Muennighoff/SBERT-base-nli-v2}
      VERITAS_EMBEDDING_NORMALIZE: ${VERITAS_EMBEDDING_NORMALIZE:-true}
      VERITAS_EMBEDDING_DEVICE: ${VERITAS_EMBEDDING_DEVICE:-auto}
      VERITAS_EMBEDDING_BATCH_SIZE: ${VERITAS_EMBEDDING_BATCH_SIZE:-16}
      VERITAS_EMBEDDING_PORT: 8090
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface
    ports:
      - "${VERITAS_EMBEDDING_PORT:-8090}:8090"
    volumes:
      - hf-cache:/models/huggingface
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=3).read()"
      interval: 20s
      timeout: 10s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      <<: *veritas-env
      VERITAS_API_PORT: ${VERITAS_API_PORT:-8080}
    ports:
      - "${VERITAS_API_PORT:-8080}:8080"
    volumes:
      - ./data:/workspace/data
    depends_on:
      opensearch:
        condition: service_healthy
      fuseki:
        condition: service_healthy
      embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 30

  cli:
    build:
      context: .
      dockerfile: Dockerfile.cli
    working_dir: /workspace
    environment:
      VERITAS_API_URL: http://api:8080
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      api:
        condition: service_started
    profiles: ["tools"]

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment:
      <<: *veritas-env
    volumes:
      - ./data:/workspace/data
      - ./config:/workspace/config:ro
      - ./packages/ontology:/workspace/ontology
    depends_on:
      opensearch:
        condition: service_healthy
      fuseki:
        condition: service_healthy
      embedding:
        condition: service_healthy
    profiles: ["tools"]

  reasoner:
    build:
      context: .
      dockerfile: services/reasoner/Dockerfile
      args:
        OPENLLET_VERSION: ${OPENLLET_VERSION:-2.6.5}
    volumes:
      - ./packages/ontology:/workspace/ontology
      - ./data/ontology:/workspace/output
    profiles: ["tools"]

  vllm-planner:
    <<: *vllm-common
    command: >
      --model ${VERITAS_PLANNER_MODEL:-Qwen/Qwen2.5-Coder-7B-Instruct}
      --served-model-name ${VERITAS_PLANNER_SERVED_MODEL_NAME:-veritas-planner}
      --host 0.0.0.0
      --port 8000
      --dtype ${VERITAS_VLLM_DTYPE:-auto}
      --max-model-len ${VERITAS_PLANNER_MAX_MODEL_LEN:-32768}
      --gpu-memory-utilization ${VERITAS_PLANNER_GPU_MEMORY_UTILIZATION:-0.30}
      --trust-remote-code
    ports:
      - "${VERITAS_PLANNER_VLLM_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 120
    profiles: ["models"]

  vllm-code:
    <<: *vllm-common
    command: >
      --model ${VERITAS_CODE_MODEL:-Qwen/Qwen2.5-Coder-14B-Instruct}
      --served-model-name ${VERITAS_CODE_SERVED_MODEL_NAME:-veritas-code}
      --host 0.0.0.0
      --port 8000
      --dtype ${VERITAS_VLLM_DTYPE:-auto}
      --max-model-len ${VERITAS_CODE_MAX_MODEL_LEN:-32768}
      --gpu-memory-utilization ${VERITAS_CODE_GPU_MEMORY_UTILIZATION:-0.60}
      --trust-remote-code
    ports:
      - "${VERITAS_CODE_VLLM_PORT:-8002}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 120
    profiles: ["code-model"]

  vllm-math:
    <<: *vllm-common
    command: >
      --model ${VERITAS_MATH_MODEL:-allenai/Olmo-3-7B-Instruct}
      --served-model-name ${VERITAS_MATH_SERVED_MODEL_NAME:-veritas-math}
      --host 0.0.0.0
      --port 8000
      --dtype ${VERITAS_VLLM_DTYPE:-auto}
      --max-model-len ${VERITAS_MATH_MAX_MODEL_LEN:-32768}
      --gpu-memory-utilization ${VERITAS_MATH_GPU_MEMORY_UTILIZATION:-0.30}
      --trust-remote-code
    ports:
      - "${VERITAS_MATH_VLLM_PORT:-8003}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 120
    profiles: ["math-model"]

volumes:
  opensearch-data:
  fuseki-data:
  hf-cache:
