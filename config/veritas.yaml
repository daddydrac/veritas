project:
  name: veritas
  namespace: https://github.com/daddydrac/veritas/ontology#
  description: Math-heavy evidence-backed research and development software-engineering
    agent.
services:
  opensearch:
    url_env: VERITAS_OPENSEARCH_URL
    index_env: VERITAS_OPENSEARCH_INDEX
    base_index_env: VERITAS_OPENSEARCH_INDEX_BASE
    read_alias_env: VERITAS_OPENSEARCH_READ_ALIAS
    write_alias_env: VERITAS_OPENSEARCH_WRITE_ALIAS
    versioned_index_env: VERITAS_OPENSEARCH_VERSIONED_INDEX
    mapping_version_env: VERITAS_OPENSEARCH_MAPPING_VERSION
    migration_command: veritas opensearch-migrate
    status_command: veritas opensearch-status
    aliases:
      base_index: veritas-papers
      read_alias: veritas-papers-read
      write_alias: veritas-papers-write
      versioned_index: veritas-papers-v1
      mapping_version: v1
    vector:
      enabled: true
      field: embedding
      engine: faiss
      method: hnsw
      space_type: cosinesimil
      dimension: 768
      m: 24
      ef_construction: 128
      ef_search: 100
      normalize: true
      norm_tolerance: 0.001
  fuseki:
    base_url_env: VERITAS_FUSEKI_BASE_URL
    query_url_env: VERITAS_FUSEKI_QUERY_URL
    update_url_env: VERITAS_FUSEKI_UPDATE_URL
    graph_url_env: VERITAS_FUSEKI_GRAPH_URL
  embedding:
    provider: http
    url_env: VERITAS_EMBEDDING_URL
    model_env: VERITAS_EMBEDDING_MODEL
    health_path: /health
    embed_path: /embed
    cosine_path: /cosine
    default_model: Muennighoff/SBERT-base-nli-v2
    dimension: 768
    normalize: true
    batch_size: 16
    cosine_eval: true
    include_formula_text: true
    include_title: true
    include_metadata_summary: true
    norm_tolerance: 0.001
  vector_memory:
    provider: opensearch-faiss-hnsw
    collection: veritas-research-chunks
  model:
    provider: vllm
    protocol: openai-compatible
    require_models_env: VERITAS_REQUIRE_MODELS
    planner:
      role: planner
      url_env: VERITAS_PLANNER_VLLM_URL
      default_url: http://vllm-planner:8000
      model_env: VERITAS_PLANNER_MODEL
      served_model_name_env: VERITAS_PLANNER_SERVED_MODEL_NAME
      default_model: Qwen/Qwen2.5-Coder-7B-Instruct
      default_served_model_name: veritas-planner
      temperature: 0.1
      max_tokens: 1800
    code:
      role: code_generation
      url_env: VERITAS_CODE_VLLM_URL
      default_url: http://vllm-code:8000
      model_env: VERITAS_CODE_MODEL
      served_model_name_env: VERITAS_CODE_SERVED_MODEL_NAME
      default_model: Qwen/Qwen2.5-Coder-14B-Instruct
      fallback_model_env: VERITAS_CODE_FALLBACK_MODEL
      fallback_model: deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct
      default_served_model_name: veritas-code
      temperature: 0.05
      max_tokens: 4096
    math:
      role: math_reasoning
      url_env: VERITAS_MATH_VLLM_URL
      default_url: http://vllm-math:8000
      model_env: VERITAS_MATH_MODEL
      served_model_name_env: VERITAS_MATH_SERVED_MODEL_NAME
      default_model: allenai/Olmo-3-7B-Instruct
      large_model_env: VERITAS_MATH_LARGE_MODEL
      large_model: allenai/Olmo-3.1-32B-Instruct
      default_served_model_name: veritas-math
      temperature: 0.1
      max_tokens: 4096
    remote:
      enabled_env: VERITAS_REMOTE_MODEL_ENABLED
      base_url_env: VERITAS_REMOTE_MODEL_BASE_URL
      api_key_env: VERITAS_REMOTE_MODEL_API_KEY
      model_env: VERITAS_REMOTE_MODEL_NAME
  shacl:
    url_env: VERITAS_SHACL_URL
    default_url: http://shacl:8080
    health_path: /health
    validate_path: /validate
retrieval:
  default_mode: hybrid
  lexical_weight: 0.45
  vector_weight: 0.55
  top_k: 10
  require_embedding_norm: true
  minimum_embedding_norm: 0.999
  maximum_embedding_norm: 1.001
  lexical_fields:
  - text^3
  - title^4
  - formulas.latex^5
  - metadata.summary^2
ingestion:
  arxiv:
    api_url: https://export.arxiv.org/api/query
    default_query: cat:cs.AI OR cat:cs.LG OR cat:math.OC
    max_results: 5
    sort_by: submittedDate
    sort_order: descending
  pdf:
    parser: docling
    fallback_parser: pypdf
    extract_formulas: true
    extract_tables: true
    preserve_equation_context: true
    formula_context_window_chars: 650
    extract_formula_images: true
    formula_ocr_provider: ${VERITAS_LATEX_OCR_PROVIDER:-heuristic}
    formula_ocr_command_env: VERITAS_LATEX_OCR_COMMAND
    formula_ocr_url_env: VERITAS_LATEX_OCR_URL
    formula_ocr_timeout_secs_env: VERITAS_LATEX_OCR_TIMEOUT_SECS
    human_validate_formulas: true
    human_validate_citations: true
  chunking:
    target_chars: 1800
    overlap_chars: 250
    hard_max_chars: 2800
    keep_formulas_with_context: true
    formula_markers:
    - $$
    - \[
    - \begin{equation}
    - \begin{align}
    - \begin{gather}
    target_words: 25
    boundary_policy: extend_to_next_period_or_semicolon
    embed_formulas_separately: true
  outputs:
    raw_pdf_dir: /workspace/data/papers
    docling_dir: /workspace/data/docling
    chunks_dir: /workspace/data/chunks
    formula_image_dir: /workspace/data/formulas
ontology:
  file: /workspace/ontology/veritas.owl
  graph_uri: urn:veritas:graph:document
  ontology_graph_uri: urn:veritas:graph:ontology
  document_graph_base_uri: urn:veritas:graph:document
  run_graph_base_uri: urn:veritas:graph:run
  validation_graph_base_uri: urn:veritas:graph:validation
  named_graph_policy:
    ontology: ontology TBox axioms and class/property declarations
    document: source document, citation, chunks, formulas, formula image metadata, evidence facts
    run: plans, tasks, generated source artifacts, model routes, human approvals
    validation: command results, SHACL findings, verification results, build status
    binary_storage: PDFs and generated binaries stay in file/object storage; Fuseki stores semantic facts and links only
  prefixes:
    veritas: https://github.com/daddydrac/veritas/ontology#
    rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
    rdfs: http://www.w3.org/2000/01/rdf-schema#
    owl: http://www.w3.org/2002/07/owl#
    xsd: http://www.w3.org/2001/XMLSchema#
codegen:
  default_language: rust
  allowed_languages:
  - rust
  - python
  - cuda
  - cpp
  - julia
  - typescript
  package_outputs_dir: /workspace/data/generated
  require_tests: true
  require_readme: true
  require_runtime_spec: true
  require_validation_report: true
  gpu:
    enabled: false
    note: Application GPU backends are not claimed unless generated and validated.
      vLLM is the supported GPU path for model serving.
cli:
  logo: veritas
  tagline: Math heavy evidence backed research and development software engineering
    agent.
  first_run_prompts: true
  configuration_target: .veritas/config.yaml + .veritas/runtime.env generated by setup
    wizard; no .env.example is committed.
validation:
  require_evidence: true
  require_acceptance_criteria: true
  require_control_flow_backcheck: true
  require_risk_register: true
  shacl_shapes: /workspace/ontology/shacl/veritas-core.shacl.ttl
  human_loop_policy_env: VERITAS_HUMAN_LOOP_POLICY
models:
  serving_solution: vllm
  image_env: VERITAS_VLLM_IMAGE
  default_image: vllm/vllm-openai:latest
  planner_default: Qwen/Qwen2.5-Coder-7B-Instruct
  code_defaults:
  - Qwen/Qwen2.5-Coder-7B-Instruct
  - Qwen/Qwen2.5-Coder-14B-Instruct
  - deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct
  math_defaults:
  - allenai/Olmo-3-7B-Instruct
  - allenai/Olmo-3.1-32B-Instruct
  embedding_default: Muennighoff/SBERT-base-nli-v2
  hf_cache_volume: hf-cache
  note: Rust API and CLI call vLLM OpenAI-compatible endpoints; vLLM downloads models
    from Hugging Face into the shared cache volume.
